<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constellation Map</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Monda:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #00000a;
      overflow: hidden;
      font-family: 'Monda', 'Georgia', sans-serif;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
    }

    /* Radial vignette darkening edges */
    #vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
          transparent 55%,
          rgba(0, 0, 8, 0.55) 80%,
          rgba(0, 0, 12, 0.92) 100%);
      pointer-events: none;
      z-index: 1;
    }

    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.08;
      background-image:
        repeating-radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.14) 0 0.6px, transparent 0.6px 2.6px),
        repeating-radial-gradient(circle at 70% 65%, rgba(255, 255, 255, 0.12) 0 0.5px, transparent 0.5px 2.3px);
      mix-blend-mode: screen;
      animation: drift 14s linear infinite;
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0);
      }

      to {
        transform: translate3d(-2%, 2%, 0);
      }
    }

    #title {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(190, 215, 255, 0.80);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      z-index: 2;
      text-shadow: 0 0 18px rgba(120, 160, 255, 0.6);
    }

    #info {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(160, 185, 230, 0.45);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-align: center;
      pointer-events: none;
      user-select: none;
      z-index: 2;
    }

    #constellation-info {
      position: fixed;
      bottom: 68px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      user-select: none;
      z-index: 2;
      opacity: 0;
      transition: opacity 1.4s ease;
      max-width: 520px;
      width: 90vw;
    }

    #constellation-info .con-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 3px;
    }

    #constellation-info .con-translation {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(190, 210, 255, 0.38);
      margin-bottom: 8px;
    }

    #constellation-info .con-desc {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.06em;
      line-height: 1.6;
      color: rgba(190, 210, 255, 0.6);
    }

    #fps {
      position: fixed;
      top: 28px;
      right: 28px;
      color: rgba(160, 185, 230, 0.55);
      font-family: 'Monda', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      pointer-events: none;
      user-select: none;
      z-index: 2;
    }

    #demo-badge {
      display: none;
      position: fixed;
      top: 48px;
      right: 28px;
      color: rgba(180, 220, 255, 0.85);
      font-family: 'Monda', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      z-index: 2;
      text-shadow: 0 0 10px rgba(120, 180, 255, 0.6);
    }

    #demo-timing {
      display: none;
      position: fixed;
      top: 66px;
      right: 28px;
      color: rgba(160, 200, 255, 0.55);
      font-family: 'Monda', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      pointer-events: none;
      user-select: none;
      z-index: 2;
      line-height: 1.7;
    }

    /* ── Splash screen ───────────────────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center,
        rgba(4, 6, 20, 0.88) 0%,
        rgba(0, 0, 10, 0.96) 100%);
      transition: opacity 0.9s ease;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #splash-inner {
      text-align: center;
      user-select: none;
    }

    #splash-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(190, 215, 255, 0.55);
      margin-bottom: 36px;
      text-shadow: 0 0 22px rgba(120, 160, 255, 0.4);
    }

    #splash-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(160, 190, 255, 0.4);
      margin-bottom: 24px;
    }

    .splash-keys {
      display: inline-flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 44px;
    }

    .key-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .key-row .key {
      display: inline-block;
      min-width: 72px;
      text-align: right;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(200, 220, 255, 0.9);
      text-shadow: 0 0 12px rgba(130, 170, 255, 0.7);
    }

    .key-row .key-sep {
      width: 1px;
      height: 14px;
      background: rgba(120, 160, 255, 0.2);
      flex-shrink: 0;
    }

    .key-row .key-desc {
      min-width: 210px;
      text-align: left;
      font-size: 12px;
      letter-spacing: 0.16em;
      color: rgba(160, 185, 230, 0.55);
    }

    #splash-prompt {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(140, 170, 220, 0.35);
      animation: pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.75; }
    }
  </style>
</head>

<body>
  <div id="splash">
    <div id="splash-inner">
      <div id="splash-title">The Celestial Firmament</div>
      <div id="splash-heading">Controls</div>
      <div class="splash-keys">
        <div class="key-row">
          <span class="key">D</span>
          <span class="key-sep"></span>
          <span class="key-desc">Toggle demo mode</span>
        </div>
        <div class="key-row">
          <span class="key">← →</span>
          <span class="key-sep"></span>
          <span class="key-desc">Prev / next constellation</span>
        </div>
        <div class="key-row">
          <span class="key">[ ]</span>
          <span class="key-sep"></span>
          <span class="key-desc">Hold time &minus;5s / +5s</span>
        </div>
        <div class="key-row">
          <span class="key">, .</span>
          <span class="key-sep"></span>
          <span class="key-desc">Transition &minus;1s / +1s</span>
        </div>
      </div>
      <div id="splash-prompt">Click or press any key</div>
    </div>
  </div>
  <div id="canvas-container"></div>
  <div id="vignette"></div>
  <div id="grain"></div>
  <div id="title">The Celestial Firmament</div>
  <div id="constellation-info">
    <div class="con-name" id="con-name"></div>
    <div class="con-translation" id="con-translation"></div>
    <div class="con-desc" id="con-desc"></div>
  </div>
  <div id="fps">-- FPS</div>
  <div id="demo-badge">Demo</div>
  <div id="demo-timing"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="main.js"></script>
</body>

</html>
